<template id="captions-template">
  <div data-composition-id="captions" data-width="1080" data-height="1920" data-duration="14">
    <div id="captions-container">
      <!-- Caption groups will be rendered here -->
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&display=swap");

      [data-composition-id="captions"] {
        width: 1080px;
        height: 1920px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: transparent;
        font-family: "EB Garamond", serif;
        text-transform: lowercase;
        color: #999999; /* Soft Graphite */
      }

      [data-composition-id="captions"] #captions-container {
        position: absolute;
        top: 1450px; /* Moved up from 1600px to avoid UI overlap */
        width: 900px; /* Centered with margins */
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      [data-composition-id="captions"] .caption-group {
        position: absolute;
        width: 100%;
        font-size: 64px; /* Increased from 52px for better readability */
        line-height: 1.2;
        letter-spacing: 0.02em;
        opacity: 0;
        padding: 10px 20px;
        border-radius: 4px;
        color: #333333; /* Darker for better contrast */
      }
    </style>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const container = document.querySelector(
          '[data-composition-id="captions"] #captions-container',
        );

        const captionGroups = [
          { text: "we asked what you needed.", start: 0.14, end: 1.18 },
          { text: "forty-seven percent of you said motion graphics,", start: 1.2, end: 3.76 },
          {
            text: "sixty-two percent said static content was costing you attention,",
            start: 3.8,
            end: 7.3,
          },
          { text: "and three out of four said you know the look you want", start: 7.32, end: 9.62 },
          { text: "but don't have the editing skills to get there.", start: 9.78, end: 12.24 },
          { text: "so we built editor agent", start: 12.3, end: 13.84 },
        ];

        captionGroups.forEach((group, index) => {
          const div = document.createElement("div");
          div.className = "caption-group";
          div.id = `group-${index}`;
          div.textContent = group.text;
          container.appendChild(div);

          const fadeDuration = 0.2;

          // Fade in
          tl.to(
            div,
            {
              opacity: 1,
              duration: fadeDuration,
              ease: "power2.out",
            },
            group.start,
          );

          // Fade out
          tl.to(
            div,
            {
              opacity: 0,
              duration: fadeDuration,
              ease: "power2.in",
            },
            group.end - fadeDuration,
          );
        });

        window.__timelines["captions"] = tl;
      })();
    </script>
  </div>
</template>
